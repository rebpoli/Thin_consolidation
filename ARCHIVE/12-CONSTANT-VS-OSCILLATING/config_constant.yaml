general:
  description: "Constant stress (5 MPa) consolidation test"
  tags: "theta_weighting_validation constant_stress"
  run_dir: ""
  run_id: "constant_5mpa"

mesh:
  Re: 0.1
  H: 0.02
  N: 100

materials:
  E: 14400000000.0
  nu: 0.2
  alpha: 0.75
  perm: 1.0e-20
  visc: 0.001
  M: 13500000000.0

boundary_conditions:
  bottom: # z=0
    Pressure: 0.0
    U_r: 0.0
    sig_zz: -5000000.0  # Constant 5 MPa stress

  top:
    U_z: 0.0
  
  right:
    U_r: 0.0
  
  left:
    U_r: 0.0

numerical:
  theta_cn: 0.75
  end_time_tv: 177.38  # T_v = c_v·t/(4H²)  — dimensionless consolidation time; t_end[s] = 4H²/c_v · T_v
  dt_min_s: 0.01
  dt_max_s: 1.0
  dt_factor: 1.5

output:
  results: outputs/results.bp
  timeseries: outputs/fem_timeseries.nc
  pressure_profile: outputs/pressure_profile.nc
